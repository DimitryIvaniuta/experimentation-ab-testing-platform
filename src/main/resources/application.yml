spring:
  application:
    name: ab-testing-platform
  main:
    web-application-type: reactive
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ab_testing}
    username: ${POSTGRES_USER:ab_user}
    password: ${POSTGRES_PASSWORD:ab_password}
    pool:
      enabled: true
      initial-size: 5
      max-size: 25
      max-idle-time: 30m
  flyway:
    enabled: true
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ab_testing}
    user: ${POSTGRES_USER:ab_user}
    password: ${POSTGRES_PASSWORD:ab_password}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

experimentation:
  admin-token: ${APP_ADMIN_TOKEN:local-admin-token}
  privacy:
    hmac-secret: ${APP_PRIVACY_HMAC_SECRET:change-me-local-dev-secret-at-least-32-chars}
  assignment-cache:
    ttl: 30d
  kafka:
    exposure-topic: experimentation.exposure.v1
    tracking-topic: experimentation.tracking.v1
  outbox:
    enabled: true
    poll-delay-ms: 1000
    batch-size: 50
    max-attempts: 10
